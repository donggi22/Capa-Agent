apiVersion: apps/v1
kind: Deployment
metadata:
  name: mes-api
  namespace: capa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mes-api
  template:
    metadata:
      labels:
        app: mes-api
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: mes-api
        image: ghcr.io/GHCR_USER/capa-mes-api:latest
        envFrom:
        - configMapRef:
            name: capa-config
        - secretRef:
            name: capa-secret
        ports:
        - containerPort: 8001
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mes-api
  namespace: capa
spec:
  selector:
    app: mes-api
  ports:
  - port: 8001
    targetPort: 8001
